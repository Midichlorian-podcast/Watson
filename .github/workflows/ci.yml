# F1 (CC-P0-18) — blokující brána: typecheck, lint, testy, build, audit a úplná
# integrační sada proti čistému PostgreSQL + skutečně běžícímu API ve dvou 2FA režimech.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# CI pouze čte repozitář; kompromitovaný krok nesmí získat write token.
permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      # Externí actions jsou připnuté na ověřené immutable SHA, ne na pohyblivý tag.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm --filter @watson/web test:corpus
      - run: pnpm build
      # Produkční závislosti bez known high/critical. Sanitizovaný report se
      # uchová i při stop-ship nálezu, aby release rozhodnutí mělo důkaz.
      - run: pnpm verify:dependency-audit
      - name: Upload dependency audit evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dependency-audit-production
          path: artifacts/dependency-audit.json
          if-no-files-found: error
          retention-days: 30

  api-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: watson
          POSTGRES_PASSWORD: watson
          POSTGRES_DB: watson
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U watson"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://watson:watson@localhost:5432/watson
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @watson/db db:migrate
      - run: bash scripts/ci-api-integration.sh
