# Sync rules — co si klient stáhne.
# ⚠️ POZN.: po ZMĚNĚ těchto pravidel (přidání sloupce/tabulky) MUSÍŠ restartovat PowerSync
#    službu, jinak klient jede dle starých pravidel: `docker restart watson-powersync`.
# R5 — scoping podle členství v projektu: klient dostane jen úkoly projektů,
# jichž je členem (parameter query čte user_id z JWT `sub`).
bucket_definitions:
  user_projects:
    # jeden bucket na každý projekt, kde je uživatel členem (parametr z JWT)
    parameters: SELECT project_id FROM project_members WHERE user_id = request.user_id()
    data:
      - SELECT id, project_id, section_id, parent_id, name, description, priority, color,
        due_date, start_date, deadline, duration_min, days, recurrence, recurrence_rule, recurrence_basis,
        assignment_mode, status_id, completed_at, created_by, created_at
        FROM tasks
        WHERE project_id = bucket.project_id
      # Projekt sám (barva projektu = tělo karet úkolů, R6) + jeho struktura.
      - SELECT id, workspace_id, name, color, icon, default_layout, visibility,
        kind, owner_id, status, delivery_date, definition_of_done,
        archived_at, created_at
        FROM projects
        WHERE id = bucket.project_id
      - SELECT id, project_id, name, position, created_at
        FROM sections
        WHERE project_id = bucket.project_id
      - SELECT id, scope, project_id, workspace_id, name, color, position, is_done, created_at
        FROM statuses
        WHERE project_id = bucket.project_id
      - SELECT id, project_id, user_id, role, created_at
        FROM project_members
        WHERE project_id = bucket.project_id
      # Detail úkolu (task-children, denormalizovaný project_id pro scoping).
      - SELECT id, task_id, project_id, user_id, completed_at, created_at
        FROM assignments
        WHERE project_id = bucket.project_id
      - SELECT id, task_id, project_id, text, checked, position, created_at
        FROM checklist_items
        WHERE project_id = bucket.project_id
      - SELECT id, task_id, project_id, author_id, body, created_at
        FROM comments
        WHERE project_id = bucket.project_id
      - SELECT id, task_id, project_id, occ_date, done, skipped, created_at
        FROM task_occurrence_overrides
        WHERE project_id = bucket.project_id
      - SELECT id, task_id, project_id, user_id, type, remind_at, offset_min, channel, created_at
        FROM reminders
        WHERE project_id = bucket.project_id
      # Postupy (štafeta) — chains + chain_steps (project-scoped).
      - SELECT id, project_id, workspace_id, template_id, name, description, anchor_date,
               state, sched_mode, skip_weekend, created_by, completed_at, created_at
        FROM chains
        WHERE project_id = bucket.project_id
      - SELECT id, chain_id, task_id, project_id, position, gate, step_state, anchor_offset, gap_days, activated_at, created_at
        FROM chain_steps
        WHERE project_id = bucket.project_id

  # Workspace-scoped entity (cíle) — jeden bucket na každý prostor, kde je uživatel členem.
  user_workspaces:
    parameters: SELECT workspace_id FROM memberships WHERE user_id = request.user_id()
    data:
      - SELECT id, workspace_id, name, scope, metric, target, due_date, periodic,
               owner_id, created_by, created_at
        FROM goals
        WHERE workspace_id = bucket.workspace_id
      - SELECT id, goal_id, project_id, workspace_id
        FROM goal_projects
        WHERE workspace_id = bucket.workspace_id
      - SELECT id, goal_id, workspace_id, label, done, position, created_at
        FROM goal_milestones
        WHERE workspace_id = bucket.workspace_id
