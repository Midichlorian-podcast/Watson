# Sync rules — co si klient stáhne.
# ⚠️ POZN.: po ZMĚNĚ těchto pravidel (přidání sloupce/tabulky) MUSÍŠ restartovat PowerSync
#    službu, jinak klient jede dle starých pravidel: `docker restart watson-powersync`.
# R5 — scoping podle členství v projektu: klient dostane jen úkoly projektů,
# jichž je členem (parameter query čte user_id z JWT `sub`).
bucket_definitions:
  user_projects:
    # jeden bucket na každý projekt, kde je uživatel členem (parametr z JWT)
    parameters: SELECT project_id FROM project_members WHERE user_id = request.user_id()
    data:
      - SELECT id, project_id, section_id, parent_id, name, description, why_now, priority, color,
               due_date, start_date, start_timezone, deadline, duration_min, days, sort_order, recurrence, recurrence_rule, recurrence_basis,
        assignment_mode, status_id, mail_th, mail_label, kind, meeting_id, completed_at, created_by, created_at
        FROM tasks
        WHERE project_id = bucket.project_id
      # Projekt sám (barva projektu = tělo karet úkolů, R6) + jeho struktura.
      - SELECT id, workspace_id, name, color, icon, default_layout, visibility,
        kind, owner_id, status, delivery_date, definition_of_done, milestones_enabled,
        archived_at, created_at, updated_at
        FROM projects
        WHERE id = bucket.project_id
      - SELECT id, project_id, name, position, created_at
        FROM sections
        WHERE project_id = bucket.project_id
      - SELECT id, scope, project_id, workspace_id, name, color, position, is_done, created_at
        FROM statuses
        WHERE project_id = bucket.project_id
      - SELECT id, project_id, user_id, role, created_at
        FROM project_members
        WHERE project_id = bucket.project_id
      # Detail úkolu (task-children, denormalizovaný project_id pro scoping).
      - SELECT id, task_id, project_id, user_id, completed_at, created_at
        FROM assignments
        WHERE project_id = bucket.project_id
      - SELECT id, task_id, project_id, parent_id, author_id, body, created_at
        FROM comments
        WHERE project_id = bucket.project_id
      # Přílohy: pouze metadata; binární obsah zůstává v server-only attachment_blobs.
      - SELECT id, task_id, project_id, comment_id, url, file_name, sha256, version,
               mime, size_bytes, uploaded_by, created_at
        FROM attachments
        WHERE project_id = bucket.project_id
      - SELECT id, comment_id, task_id, project_id, marked_by, created_at
        FROM comment_decisions
        WHERE project_id = bucket.project_id
      - SELECT id, comment_id, task_id, project_id, user_id, created_by, created_at
        FROM mentions
        WHERE project_id = bucket.project_id
      - SELECT id, comment_id, task_id, project_id, user_id, emoji, created_at
        FROM comment_reactions
        WHERE project_id = bucket.project_id
      - SELECT id, task_id, project_id, occ_date, done, skipped, created_at
        FROM task_occurrence_overrides
        WHERE project_id = bucket.project_id
      - SELECT id, project_id, blocking_task_id, blocked_task_id, created_by, created_at
        FROM task_dependencies
        WHERE project_id = bucket.project_id
      # Typovaná vlastní pole: projektové definice + hodnoty úkolů, jen read model.
      - SELECT id, project_id, name, field_type, options, position, created_by, created_at, updated_at
        FROM project_custom_fields
        WHERE project_id = bucket.project_id
      - SELECT id, field_id, task_id, project_id, value, updated_by, created_at, updated_at
        FROM task_custom_field_values
        WHERE project_id = bucket.project_id
      # Samostatné vložitelné ankety a jejich pojmenované odpovědi.
      - SELECT id, task_id, project_id, question, response_type, options, closed_at,
               created_by, created_at, updated_at
        FROM task_polls
        WHERE project_id = bucket.project_id
      - SELECT id, poll_id, task_id, project_id, respondent_id, value, created_at, updated_at
        FROM task_poll_responses
        WHERE project_id = bucket.project_id
      # Volitelné projektové milníky; splnění se odvozuje z úkolů, neukládá se.
      - SELECT id, project_id, title, condition_type, task_id, target_count, due_date,
               position, created_by, created_at, updated_at
        FROM project_milestones
        WHERE project_id = bucket.project_id
      # task_activity (audit log) se ZÁMĚRNĚ NEsyncuje — je insert-only (klient jen nahrává),
      # detail historie se čte přes GET /api/tasks/:id/activity. Jinak roste do stovek MB/zařízení.
      # Postupy (štafeta) — chains + chain_steps (project-scoped).
      - SELECT id, project_id, workspace_id, template_id, name, description, anchor_date,
               state, sched_mode, skip_weekend, created_by, completed_at, created_at
        FROM chains
        WHERE project_id = bucket.project_id
      - SELECT id, chain_id, task_id, project_id, position, gate, step_state, anchor_offset, gap_days, activated_at, created_at
        FROM chain_steps
        WHERE project_id = bucket.project_id

  # R6 — per-uživatelská barva úkolu: vlastní bucket parametrizovaný přihlášeným uživatelem.
  # (request.user_id() smí být JEN v parameter query, ne v data query — proto samostatný bucket.)
  user_own:
    parameters: SELECT request.user_id() AS user_id
    data:
      - SELECT id, task_id, project_id, user_id, color, created_at
        FROM task_user_colors
        WHERE user_id = bucket.user_id
      # Připomínky jsou OSOBNÍ (offset per uživatel) → syncovat jen vlastní, ne celý projekt.
      # (Dřív v user_projects bez filtru user_id → každý člen viděl připomínky ostatních.)
      - SELECT id, task_id, project_id, user_id, type, remind_at, offset_min, channel, created_at
        FROM reminders
        WHERE user_id = bucket.user_id
      # Osobní uložené pohledy — pouze jejich autor.
      - SELECT id, owner_scope, user_id, workspace_id, name, query, surface, config, version, created_at, updated_at
        FROM filters
        WHERE user_id = bucket.user_id AND owner_scope = 'user' AND query = 'tasks:v1'

  # Workspace-scoped entity (cíle) — jeden bucket na každý prostor, kde je uživatel členem.
  user_workspaces:
    parameters: SELECT workspace_id FROM memberships WHERE user_id = request.user_id()
    data:
      - SELECT id, name, is_personal, task_conflict_policy
        FROM workspaces
        WHERE id = bucket.workspace_id
      - SELECT id, workspace_id, name, scope, metric, target, due_date, period, periodic,
               period_start, filter_person_id, filter_keyword, owner_id, created_by, created_at
        FROM goals
        WHERE workspace_id = bucket.workspace_id
      - SELECT id, goal_id, project_id, workspace_id
        FROM goal_projects
        WHERE workspace_id = bucket.workspace_id
      - SELECT id, goal_id, workspace_id, label, done, position, created_at
        FROM goal_milestones
        WHERE workspace_id = bucket.workspace_id
      # Seznamy — checklisty na akce (handoff 2026-07-10).
      - SELECT id, workspace_id, project_id, template_id, name, event, archived, created_by, created_at
        FROM lists
        WHERE workspace_id = bucket.workspace_id
      - SELECT id, list_id, workspace_id, name, position, created_at
        FROM list_sections
        WHERE workspace_id = bucket.workspace_id
      - SELECT id, list_id, section_id, workspace_id, text, qty, who_id, done, position, created_at
        FROM list_items
        WHERE workspace_id = bucket.workspace_id
      - SELECT id, workspace_id, name, description, sections, created_by, created_at
        FROM list_templates
        WHERE workspace_id = bucket.workspace_id
      # Kontakty — reálný adresář (sféra = workspace); zdroj pro našeptávání v mailu.
      - SELECT id, workspace_id, name, email, org, role, areas, note, created_by, created_at
        FROM contacts
        WHERE workspace_id = bucket.workspace_id
      # Polymorfní vazby (mail↔úkol, LuckyOS↔úkol) — dedup + proklik do cizí domény.
      - SELECT id, workspace_id, from_type, from_id, to_type, to_id, relation, source_system, external_id, created_at
        FROM entity_links
        WHERE workspace_id = bucket.workspace_id
      # Meets — porada (sidecar kotevního úkolu): JEN METADATA. Přepis a AI extraction se
      # ZÁMĚRNĚ nesyncují plošně (CC-P0-13: obsah smí jen účastník/pozvaný) — do participant
      # ACL bucketu se čtou on-demand přes GET /api/meetings/:id.
      - SELECT id, workspace_id, title, status, hub_task_id, series_id, prev_meeting_id, created_by, created_at
        FROM meetings
        WHERE workspace_id = bucket.workspace_id
      # Týmové uložené pohledy — vidí všichni členové prostoru, mění je jen vedení přes API.
      - SELECT id, owner_scope, user_id, workspace_id, name, query, surface, config, version, created_at, updated_at
        FROM filters
        WHERE workspace_id = bucket.workspace_id AND owner_scope = 'workspace' AND query = 'tasks:v1'
